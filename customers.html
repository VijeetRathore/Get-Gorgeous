<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Customers — Get Gorgeous</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="app-shell">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main">
      <div class="topbar" id="topbar"></div>

      <div class="flex gap-12 mb-16" style="justify-content: space-between; flex-wrap: wrap;">
        <input type="search" id="searchBox" placeholder="Search by name or mobile…" style="max-width: 320px;">
        <button class="btn btn-primary" id="btnAddCustomer">+ New Customer</button>
      </div>

      <div class="card" style="padding: 0;">
        <div id="customerList"></div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Customer Modal -->
  <dialog id="customerModal" style="border:none; border-radius: 20px; padding: 0; width: min(520px, 92vw);">
    <form method="dialog" id="customerForm" class="card" style="border:none; box-shadow:none;">
      <h2 class="mb-16">New Customer</h2>
      <input type="hidden" id="custId">
      <div class="grid grid-2">
        <div class="field"><label>Name *</label><input type="text" id="custName" required></div>
        <div class="field"><label>Mobile *</label><input type="tel" id="custMobile" required></div>
        <div class="field"><label>DOB</label><input type="date" id="custDob"></div>
        <div class="field"><label>Anniversary</label><input type="date" id="custAnniversary"></div>
      </div>
      <div class="field"><label>Address</label><input type="text" id="custAddress"></div>
      <div class="grid grid-2">
        <div class="field"><label>Skin Type</label>
          <select id="custSkinType"><option value="">—</option><option>Normal</option><option>Oily</option><option>Dry</option><option>Combination</option><option>Sensitive</option></select>
        </div>
        <div class="field"><label>Preferred Beautician</label><input type="text" id="custBeautician"></div>
      </div>
      <div class="field"><label>Allergies / Notes</label><textarea id="custNotes" rows="2"></textarea></div>
      <div class="flex gap-12" style="justify-content: flex-end;">
        <button type="button" class="btn btn-ghost" id="btnCancel">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Customer</button>
      </div>
    </form>
  </dialog>

  <script src="assets/js/db.js"></script>
  <script src="assets/js/shell.js"></script>
  <script src="assets/js/customers.js"></script>
</body>
</html>
