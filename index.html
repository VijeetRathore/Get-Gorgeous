<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Get Gorgeous</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  body { display:flex; align-items:center; justify-content:center; height:100vh; background: var(--surface-sunken); }
  .lock-card { width: min(340px, 90vw); text-align:center; }
  .lock-card .brand { width:64px; height:64px; border-radius:50%; background:var(--accent); color:#fff;
    display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:1.5rem; margin:0 auto 16px; }
  #pinInput { text-align:center; letter-spacing: 0.5em; font-size: 1.4rem; }
</style>
</head>
<body>
  <div class="card lock-card">
    <div class="brand">GG</div>
    <h2 id="lockTitle" class="mb-16">Enter PIN</h2>
    <div class="field">
      <input type="password" id="pinInput" inputmode="numeric" maxlength="6" placeholder="••••">
    </div>
    <button class="btn btn-primary" style="width:100%;" onclick="submitPin()">Unlock</button>
    <div id="lockError" class="text-soft mt-16" style="color: var(--danger); display:none;">Wrong PIN, try again.</div>
  </div>

  <script src="assets/js/db.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js').catch(() => {}));
    }
  </script>
  <script>
    async function boot() {
      const existingPin = await DB.getSetting('pinHash');
      document.getElementById('lockTitle').textContent = existingPin ? 'Enter PIN' : 'Set a PIN to get started';
    }
    boot();

    async function simpleHash(str) {
      const enc = new TextEncoder().encode(str);
      const buf = await crypto.subtle.digest('SHA-256', enc);
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function submitPin() {
      const val = document.getElementById('pinInput').value.trim();
      if (val.length < 4) return alert('PIN should be at least 4 digits.');
      const hash = await simpleHash(val);
      const existingPin = await DB.getSetting('pinHash');

      if (!existingPin) {
        await DB.setSetting('pinHash', hash);
        window.location.href = 'dashboard.html';
        return;
      }
      if (hash === existingPin) {
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('lockError').style.display = 'block';
        document.getElementById('pinInput').value = '';
      }
    }

    document.getElementById('pinInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitPin();
    });
  </script>
</body>
</html>
