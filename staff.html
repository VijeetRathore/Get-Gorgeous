<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Staff — Get Gorgeous</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="app-shell">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main">
      <div class="topbar" id="topbar"></div>

      <div class="flex gap-8 mb-16">
        <button class="btn btn-secondary" id="tabBtn-list" onclick="switchTab('list')">Staff List</button>
        <button class="btn btn-ghost" id="tabBtn-attendance" onclick="switchTab('attendance')">Today's Attendance</button>
      </div>

      <div id="tab-list">
        <div class="flex mb-16" style="justify-content: space-between;">
          <h3>Staff</h3>
          <button class="btn btn-primary" onclick="openStaffModal()">+ New Staff</button>
        </div>
        <div class="card" style="padding:0;"><div id="staffList"></div></div>
      </div>

      <div id="tab-attendance" style="display:none;">
        <h3 class="mb-16">Mark Attendance — <span id="attDateLabel"></span></h3>
        <div class="card" style="padding:0;"><div id="attendanceList"></div></div>
      </div>
    </main>
  </div>

  <!-- Staff Modal -->
  <dialog id="staffModal" style="border:none; border-radius: 20px; padding: 0; width: min(480px, 92vw);">
    <form method="dialog" id="staffForm" class="card" style="border:none; box-shadow:none;">
      <h2 class="mb-16">New Staff</h2>
      <input type="hidden" id="stfId">
      <div class="grid grid-2">
        <div class="field"><label>Name *</label><input id="stfName" required></div>
        <div class="field"><label>Mobile</label><input id="stfMobile" type="tel"></div>
      </div>
      <div class="grid grid-2">
        <div class="field"><label>Joining Date</label><input id="stfJoining" type="date"></div>
        <div class="field"><label>Monthly Salary (₹)</label><input id="stfSalary" type="number" min="0"></div>
      </div>
      <div class="field"><label>Commission Rate (%)</label><input id="stfCommission" type="number" min="0" max="100"></div>
      <div class="flex gap-12" style="justify-content: flex-end;">
        <button type="button" class="btn btn-ghost" onclick="document.getElementById('staffModal').close()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Staff</button>
      </div>
    </form>
  </dialog>

  <script src="assets/js/db.js"></script>
  <script src="assets/js/shell.js"></script>
  <script src="assets/js/staff.js"></script>
</body>
</html>
