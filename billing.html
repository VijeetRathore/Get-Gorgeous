<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Billing — Get Gorgeous</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="app-shell">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main">
      <div class="topbar" id="topbar"></div>

      <div class="grid" style="grid-template-columns: 1.6fr 1fr; gap: 16px; align-items: start;">
        <!-- Left: bill builder -->
        <div class="card">
          <div class="field">
            <label>Customer *</label>
            <select id="billCustomer"></select>
          </div>

          <label>Add Service</label>
          <div class="flex gap-8 mb-16">
            <select id="serviceSelect" style="flex:1;"></select>
            <button class="btn btn-secondary" onclick="addServiceLine()">Add</button>
          </div>

          <label>Add Product Sale</label>
          <div class="flex gap-8 mb-16">
            <select id="productSelect" style="flex:1;"></select>
            <input id="productQty" type="number" min="1" value="1" style="max-width:90px;">
            <button class="btn btn-secondary" onclick="addProductLine()">Add</button>
          </div>

          <h3 class="mb-16 mt-16">Bill Items</h3>
          <div id="billItems"><div class="empty-state text-soft">No items added yet.</div></div>
        </div>

        <!-- Right: summary & payment -->
        <div class="card">
          <h3 class="mb-16">Summary</h3>
          <div class="list-row"><span>Subtotal</span><strong id="sumSubtotal">₹0</strong></div>
          <div class="field mt-16">
            <label>Discount (₹)</label>
            <input id="discountInput" type="number" min="0" value="0" oninput="renderSummary()">
          </div>
          <div class="field">
            <label>Redeem Loyalty Points</label>
            <input id="redeemPoints" type="number" min="0" value="0" oninput="renderSummary()">
            <div class="text-soft" style="font-size:0.78rem;" id="pointsAvailable">Customer has 0 points (₹0 value)</div>
          </div>
          <div class="list-row" style="border-top:1.5px solid var(--line); margin-top:8px;">
            <span style="font-weight:700;">Total Payable</span>
            <strong id="sumTotal" style="font-size:1.3rem; color: var(--accent);">₹0</strong>
          </div>
          <div class="field mt-16">
            <label>Payment Mode</label>
            <select id="paymentMode">
              <option>Cash</option>
              <option>UPI</option>
              <option>Card</option>
            </select>
          </div>
          <div class="text-soft mb-16" style="font-size:0.8rem;" id="pointsEarnedPreview">+0 points will be earned</div>
          <button class="btn btn-primary" style="width:100%;" onclick="saveBill()">Save & Complete Bill</button>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/db.js"></script>
  <script src="assets/js/shell.js"></script>
  <script src="assets/js/billing.js"></script>
</body>
</html>
